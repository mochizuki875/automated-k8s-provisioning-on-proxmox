# =============================================================================
# tempo values.yaml
# Grafana Tempo - Single Binary モード設定
# OTLP/Jaeger レシーバーを有効化
# Metrics Generator でサービスグラフ・スパンメトリクスを VictoriaMetrics に送信
# =============================================================================

tempo:
  # ---------------------------------------------------------------------------
  # ストレージ設定 (ローカルファイルシステム)
  # ---------------------------------------------------------------------------
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  # ---------------------------------------------------------------------------
  # トレースレシーバー設定
  # OTLP (gRPC: 4317, HTTP: 4318) および Jaeger を有効化
  # ---------------------------------------------------------------------------
  receivers:
    jaeger:
      protocols:
        grpc:
          endpoint: 0.0.0.0:14250
        thrift_binary:
          endpoint: 0.0.0.0:6832
        thrift_compact:
          endpoint: 0.0.0.0:6831
        thrift_http:
          endpoint: 0.0.0.0:14268
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  # ---------------------------------------------------------------------------
  # Metrics Generator 設定
  # サービスグラフ・スパンメトリクスを生成して VictoriaMetrics へ送信
  # これにより Grafana の serviceMap (サービスグラフ) 機能が利用可能になる
  # ---------------------------------------------------------------------------
  metricsGenerator:
    enabled: true
    # VictoriaMetrics VMSingle の remote_write エンドポイント
    # helmfile リリース名: vmks → サービス名: vmsingle-vmks-victoria-metrics-k8s-stack
    remoteWriteUrl: "http://vmsingle-vmks-victoria-metrics-k8s-stack.monitoring.svc.cluster.local:8428/api/v1/write"
    processor:
      service_graphs:
        wait: 10s
        max_items: 10000
        dimensions:
          - service.namespace
          - service.version
      span_metrics:
        enable_target_info: true
        dimensions:
          - service.namespace
          - service.version
          - http.method
          - http.status_code
      local_blocks:
        flush_check_period: 10s
        trace_idle_period: 30s        # アイドルトレースを早めにフラッシュ
        max_block_duration: 10m       # 旧: 6h → 10m に大幅短縮
        max_block_bytes: 52428800     # 旧: 500MiB → 50MiB に大幅削減
        filter_server_spans: false
        complete_block_timeout: 15m   # 旧: 6h → 15m に大幅短縮
    storage:
      # Metrics Generator のメトリクスブロック保存パス (PVC マウント先 /var/tempo 配下)
      path: "/var/tempo/metrics"
      remote_write: []
    traces_storage:
      # Metrics Generator の WAL パス (デフォルト /tmp/traces は ephemeral なため PVC 配下に変更)
      path: "/var/tempo/metrics-wal"

  # ---------------------------------------------------------------------------
  # Metrics Generator プロセッサーを全テナントに対して有効化
  # ---------------------------------------------------------------------------
  overrides:
    defaults:
      metrics_generator:
        processors:
          - service-graphs
          - span-metrics
          - local-blocks
    per_tenant_override_config: /conf/overrides.yaml

  # ---------------------------------------------------------------------------
  # サーバー設定
  # ---------------------------------------------------------------------------
  server:
    http_listen_port: 3200

  # GC ballast: 1024MiB(デフォルト) → 256MiB に削減
  # GCを頻繁に動作させてメモリ使用量ピークを抑える
  memBallastSizeMbs: 256

  # トレースデータ保持期間
  retention: 24h

  # ---------------------------------------------------------------------------
  # Compactor 設定
  # max_block_bytes: 1 ブロックあたりの上限サイズ (コンパクション時の一時メモリ消費抑制)
  # ---------------------------------------------------------------------------
  compactor:
    compaction:
      max_block_bytes: 524288000  # 500MiB: コンパクション後ブロック上限

  # ---------------------------------------------------------------------------
  # リソース制限設定
  # メモリ逼迫対策: BestEffort → Burstable QoS に変更
  # ---------------------------------------------------------------------------
  resources:
    limits:
      memory: 8Gi
    requests:
      memory: 2Gi
      cpu: 500m

# ---------------------------------------------------------------------------
# データ永続化設定
# ---------------------------------------------------------------------------
persistence:
  enabled: true
  enableStatefulSetAutoDeletePVC: true
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  storageClassName: rook-ceph-block

# ---------------------------------------------------------------------------
# ServiceMonitor 設定
# VictoriaMetrics Operator は VMServiceScrape を使用するため無効化
# ---------------------------------------------------------------------------
serviceMonitor:
  enabled: false
