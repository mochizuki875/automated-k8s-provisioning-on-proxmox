apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-trace-metrics
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  trace-metrics.json: |
    {
      "title": "Trace Metrics",
      "uid": "trace-metrics",
      "description": "Monitoring trace metrics via Tempo local_blocks (TraceQL metrics). Filterable by Data Source / Namespace / Service. Click an exemplar to navigate to the trace.",
      "schemaVersion": 38,
      "version": 3,
      "refresh": "60s",
      "graphTooltip": 1,
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "tags": [
        "tracing",
        "tempo",
        "metrics"
      ],
      "links": [],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "label": "Data Source",
            "query": "tempo",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "options": [],
            "regex": "^Tempo$",
            "refresh": 1
          },
          {
            "name": "vm_ds",
            "type": "datasource",
            "label": "VictoriaMetrics",
            "query": "prometheus",
            "current": {},
            "hide": 2,
            "includeAll": false,
            "multi": false,
            "options": [],
            "regex": "VictoriaMetrics$",
            "refresh": 1
          },
          {
            "name": "namespace",
            "type": "query",
            "label": "Namespace",
            "datasource": {
              "type": "prometheus",
              "uid": "${vm_ds}"
            },
            "query": "label_values(traces_spanmetrics_calls_total, service_namespace)",
            "current": {},
            "hide": 0,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "sort": 1,
            "refresh": 2
          },
          {
            "name": "service",
            "type": "query",
            "label": "Service",
            "datasource": {
              "type": "prometheus",
              "uid": "${vm_ds}"
            },
            "query": "label_values(traces_spanmetrics_calls_total, service)",
            "current": {},
            "hide": 0,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "sort": 1,
            "refresh": 2
          }
        ]
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0,211,255,1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "type": "row",
          "id": 1,
          "title": "Overview",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "collapsed": false
        },
        {
          "type": "stat",
          "id": 10,
          "title": "Request Count (Total in Period)",
          "description": "Total span count in the selected period.",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "datasource": {
            "type": "tempo",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "blue",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "sum"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "tempo",
                "uid": "${datasource}"
              },
              "queryType": "traceql",
              "query": "{resource.service.namespace=~\"$namespace\" && resource.service.name=~\"$service\"} | count_over_time()",
              "legendFormat": "",
              "instant": true
            }
          ]
        },
        {
          "type": "stat",
          "id": 11,
          "title": "Error Count (Total in Period)",
          "description": "Total error span count in the selected period.",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 1
          },
          "datasource": {
            "type": "tempo",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 10
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "sum"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "tempo",
                "uid": "${datasource}"
              },
              "queryType": "traceql",
              "query": "{resource.service.namespace=~\"$namespace\" && resource.service.name=~\"$service\" && status = error} | count_over_time()",
              "legendFormat": "",
              "instant": true
            }
          ]
        },
        {
          "type": "stat",
          "id": 12,
          "title": "Average Request Rate (in Period)",
          "description": "Average span/sec in the selected period. Calculated by averaging data across the entire time window.",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 1
          },
          "datasource": {
            "type": "tempo",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "blue",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "mean"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "tempo",
                "uid": "${datasource}"
              },
              "queryType": "traceql",
              "query": "{resource.service.namespace=~\"$namespace\" && resource.service.name=~\"$service\"} | rate()",
              "legendFormat": "",
              "instant": false,
              "exemplars": 100
            }
          ]
        },
        {
          "type": "stat",
          "id": 13,
          "title": "p99 Latency (Period Average)",
          "description": "Average p99 latency in the selected period. Calculated by averaging data across the entire time window.",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 1
          },
          "datasource": {
            "type": "tempo",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ns",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 500000000
                  },
                  {
                    "color": "red",
                    "value": 1000000000
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "mean"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "tempo",
                "uid": "${datasource}"
              },
              "queryType": "traceql",
              "query": "{resource.service.namespace=~\"$namespace\" && resource.service.name=~\"$service\"} | quantile_over_time(duration, 0.99)",
              "legendFormat": "",
              "instant": false,
              "exemplars": 100
            }
          ]
        },
        {
          "type": "row",
          "id": 2,
          "title": "Request / Error",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "collapsed": false
        },
        {
          "type": "timeseries",
          "interval": "10s",
          "id": 20,
          "title": "Request Rate (Requests / sec)",
          "description": "Span rate by service. Click an exemplar to navigate to the trace.",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 6
          },
          "datasource": {
            "type": "tempo",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 5,
                "showPoints": "auto"
              },
              "links": []
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "tempo",
                "uid": "${datasource}"
              },
              "queryType": "traceql",
              "query": "{resource.service.namespace=~\"$namespace\" && resource.service.name=~\"$service\"} | rate() by (resource.service.name)",
              "legendFormat": "{{resource.service.name}}",
              "instant": false,
              "exemplars": 100
            }
          ]
        },
        {
          "type": "timeseries",
          "interval": "10s",
          "id": 21,
          "title": "Error Rate (Errors / sec)",
          "description": "Span rate for status = error.",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 6
          },
          "datasource": {
            "type": "tempo",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "auto"
              },
              "links": [],
              "color": {
                "mode": "palette-classic",
                "fixedColor": "red"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "tempo",
                "uid": "${datasource}"
              },
              "queryType": "traceql",
              "query": "{resource.service.namespace=~\"$namespace\" && resource.service.name=~\"$service\" && status = error} | rate() by (resource.service.name)",
              "legendFormat": "{{resource.service.name}} (error)",
              "instant": false,
              "exemplars": 100
            }
          ]
        },
        {
          "type": "row",
          "id": 3,
          "title": "Error Details",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 14
          },
          "collapsed": false
        },
        {
          "type": "timeseries",
          "interval": "10s",
          "id": 30,
          "title": "Error Count",
          "description": "Number of error spans per unit time.",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 15
          },
          "datasource": {
            "type": "tempo",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 5,
                "showPoints": "auto"
              },
              "links": [],
              "color": {
                "mode": "palette-classic",
                "fixedColor": "semi-dark-red"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "tempo",
                "uid": "${datasource}"
              },
              "queryType": "traceql",
              "query": "{resource.service.namespace=~\"$namespace\" && resource.service.name=~\"$service\" && status = error} | count_over_time() by (resource.service.name)",
              "legendFormat": "{{resource.service.name}}",
              "instant": false,
              "exemplars": 100
            }
          ]
        },
        {
          "type": "timeseries",
          "interval": "10s",
          "id": 31,
          "title": "Request Rate by Span Kind",
          "description": "Span rate per SERVER / CLIENT / PRODUCER / CONSUMER.",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 15
          },
          "datasource": {
            "type": "tempo",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 5,
                "showPoints": "auto"
              },
              "links": []
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "tempo",
                "uid": "${datasource}"
              },
              "queryType": "traceql",
              "query": "{resource.service.namespace=~\"$namespace\" && resource.service.name=~\"$service\"} | rate() by (kind)",
              "legendFormat": "{{kind}}",
              "instant": false,
              "exemplars": 100
            }
          ]
        },
        {
          "type": "row",
          "id": 4,
          "title": "Latency",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 23
          },
          "collapsed": false
        },
        {
          "type": "timeseries",
          "interval": "10s",
          "id": 40,
          "title": "Latency p99 / p95 / p50 (by Service)",
          "description": "Latency percentiles via TraceQL quantile_over_time. Click an exemplar to navigate to slow traces.",
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 24
          },
          "datasource": {
            "type": "tempo",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ns",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 5,
                "showPoints": "auto"
              },
              "links": []
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "tempo",
                "uid": "${datasource}"
              },
              "queryType": "traceql",
              "query": "{resource.service.namespace=~\"$namespace\" && resource.service.name=~\"$service\"} | quantile_over_time(duration, 0.99) by (resource.service.name)",
              "legendFormat": "p99 {{resource.service.name}}",
              "instant": false,
              "exemplars": 100
            },
            {
              "refId": "B",
              "datasource": {
                "type": "tempo",
                "uid": "${datasource}"
              },
              "queryType": "traceql",
              "query": "{resource.service.namespace=~\"$namespace\" && resource.service.name=~\"$service\"} | quantile_over_time(duration, 0.95) by (resource.service.name)",
              "legendFormat": "p95 {{resource.service.name}}",
              "instant": false,
              "exemplars": 100
            },
            {
              "refId": "C",
              "datasource": {
                "type": "tempo",
                "uid": "${datasource}"
              },
              "queryType": "traceql",
              "query": "{resource.service.namespace=~\"$namespace\" && resource.service.name=~\"$service\"} | quantile_over_time(duration, 0.50) by (resource.service.name)",
              "legendFormat": "p50 {{resource.service.name}}",
              "instant": false,
              "exemplars": 100
            }
          ]
        },
        {
          "type": "row",
          "id": 5,
          "title": "Span Delay Distribution / HTTP Status",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 32
          },
          "collapsed": false
        },
        {
          "type": "timeseries",
          "interval": "10s",
          "id": 50,
          "title": "Request Rate by HTTP Method",
          "description": "Span rate by HTTP method (GET / POST, etc.).",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 33
          },
          "datasource": {
            "type": "tempo",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 5,
                "showPoints": "auto"
              },
              "links": []
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "tempo",
                "uid": "${datasource}"
              },
              "queryType": "traceql",
              "query": "{resource.service.namespace=~\"$namespace\" && resource.service.name=~\"$service\"} | rate() by (span.http.method)",
              "legendFormat": "{{span.http.method}}",
              "instant": false,
              "exemplars": 100
            }
          ]
        },
        {
          "type": "timeseries",
          "interval": "10s",
          "id": 51,
          "title": "Request Rate by HTTP Status",
          "description": "Span rate by HTTP status code.",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 33
          },
          "datasource": {
            "type": "tempo",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 5,
                "showPoints": "auto"
              },
              "links": []
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "tempo",
                "uid": "${datasource}"
              },
              "queryType": "traceql",
              "query": "{resource.service.namespace=~\"$namespace\" && resource.service.name=~\"$service\"} | rate() by (span.http.status_code)",
              "legendFormat": "{{span.http.status_code}}",
              "instant": false,
              "exemplars": 100
            }
          ]
        }
      ]
    }
